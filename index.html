<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A minimal, fast, and private shopping list app.">
    <title>Shopping List</title>

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Install PWA Banner -->
    <div id="install-banner" class="install-banner hidden">
        <div class="banner-content">
            <span class="banner-icon">📱</span>
            <p>Install this app on your home screen for quick and offline access!</p>
        </div>
        <div class="banner-actions">
            <button id="install-btn" class="primary-btn small">Install</button>
            <button id="close-banner-btn" class="icon-btn" aria-label="Close banner">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 6L6 18M6 6l12 12"></path></svg>
            </button>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar: List Management -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <h1>My Lists</h1>
                <button id="close-sidebar-btn" class="icon-btn mobile-only" aria-label="Close sidebar">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                </button>
            </header>
            
            <div class="add-list-container">
                <form id="add-list-form">
                    <input type="text" id="new-list-input" placeholder="New list name..." required autocomplete="off">
                    <button type="submit" class="primary-btn" aria-label="Add List">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 5v14M5 12h14"></path></svg>
                    </button>
                </form>
            </div>

            <nav class="lists-nav">
                <ul id="lists-container" class="lists-container">
                    <!-- Lists rendered dynamically here -->
                </ul>
            </nav>
        </aside>

        <!-- Main Content: Items Management -->
        <main class="main-content">
            <header class="main-header">
                <button id="menu-btn" class="icon-btn mobile-only" aria-label="Open lists menu">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
                </button>
                <h2 id="current-list-title">Select a list</h2>
                <!-- Spacer for flex alignment -->
                <div class="header-spacer"></div>
            </header>

            <section class="items-section">
                <form id="add-item-form" class="add-item-form hidden">
                    <input type="text" id="new-item-input" placeholder="Add an item..." required autocomplete="off">
                    <button type="submit" class="primary-btn" aria-label="Add Item">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 5v14M5 12h14"></path></svg>
                    </button>
                </form>

                <div class="items-list-container">
                    <ul id="items-container" class="items-container">
                        <!-- Items rendered dynamically here -->
                    </ul>
                    
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">🛒</div>
                        <p>No items here yet.</p>
                        <p class="sub-text">Add some items to get started!</p>
                    </div>
                </div>
            </section>
        </main>
        
        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay" class="overlay"></div>
    </div>

    <!-- Scripts (loaded at the bottom for performance) -->
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
